name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      # ---- Wait for the `cardanowall` SDK dependency on crates.io -------------
      # The published Cargo.toml pins `cardanowall = "<version>"` from crates.io.
      # On the coordinated-release sync commit, the SDK crate of the same version
      # is published by a parallel workflow (label-309-rs) and may not be in the
      # registry index yet, so the cargo resolution in the gates below would fail —
      # the only window in which it can. Read the pinned version and poll the sparse
      # index (the exact source cargo resolves against) until it appears, up to ~15
      # minutes. On every normal push the version is already live, so the first poll
      # succeeds and this is a no-op.
      - name: Wait for the `cardanowall` SDK on crates.io
        run: |
          set -euo pipefail
          version=$(grep -E '^cardanowall = "' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$version" ]; then echo "::error::could not read the cardanowall version from Cargo.toml"; exit 1; fi
          echo "CI needs cardanowall@$version from crates.io; polling the index..."
          for attempt in $(seq 1 90); do
            if curl -fsSL "https://index.crates.io/ca/rd/cardanowall" | grep -q '"vers":"'"$version"'"'; then
              echo "cardanowall@$version is live (after $attempt check(s))."
              exit 0
            fi
            echo "  check $attempt/90: not in the index yet; sleeping 10s..."
            sleep 10
          done
          echo "::error::cardanowall@$version did not reach crates.io within ~15 min; the SDK publish (label-309-rs) may still be running or failed."
          exit 1

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets --all-features

      - name: Test (full suite)
        run: cargo test --all-features
